version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: autoflow_postgres
    environment:
      POSTGRES_USER: ${DB_ADMIN_USER:-autoflow_owner}
      POSTGRES_PASSWORD: ${DB_ADMIN_PASSWORD:-owner_change_me}
      POSTGRES_DB: ${DB_NAME:-autoflow}
      DB_APP_USER: ${DB_APP_USER:-app_user}
      DB_APP_PASSWORD: ${DB_APP_PASSWORD:-app_change_me}
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_ADMIN_USER:-autoflow_owner} -d ${DB_NAME:-autoflow}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: autoflow_redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: autoflow_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-minioadmin} ${S3_SECRET_KEY:-minioadmin};
      mc mb --ignore-existing local/${S3_BUCKET:-autoflow};
      mc anonymous set download local/${S3_BUCKET:-autoflow};
      exit 0;
      "

  app:
    build: .
    container_name: autoflow_app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file: .env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      S3_ENDPOINT: http://minio:9000
    ports:
      - "3000:3000"
    command: ["node", "dist/src/main.js"]

  worker:
    build: .
    container_name: autoflow_worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file: .env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      S3_ENDPOINT: http://minio:9000
    command: ["node", "dist/src/worker.js"]

volumes:
  pg_data:
  redis_data:
  minio_data:
