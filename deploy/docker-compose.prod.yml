# Production compose for a single Hetzner server.
# Copied to /opt/autoflow/docker-compose.yml by the deploy workflow.
# Interpolation values (DOCKERHUB_USER, IMAGE_TAG, SITE_ADDRESS, MEDIA_ADDRESS)
# and service env come from /opt/autoflow/.env — see .env.production.example.

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      # Media entrypoint in the no-domain (plain-IP) mode; idle otherwise.
      - "8081:8081"
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS}
      MEDIA_ADDRESS: ${MEDIA_ADDRESS}
      S3_BUCKET: ${S3_BUCKET}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - app

  frontend:
    image: ${DOCKERHUB_USER}/autoflow-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    # No env_file on purpose: the shared .env holds JWT/DB/S3 secrets the
    # Next.js process has no business seeing — an RCE there must not hand
    # over the whole stack. Only what the frontend actually reads:
    environment:
      NODE_ENV: production
      BACKEND_INTERNAL_URL: http://app:3000/api
      ADMIN_COOKIE_NAME: ${ADMIN_COOKIE_NAME}
      ADMIN_COOKIE_DOMAIN: ${ADMIN_COOKIE_DOMAIN:-}
      # From the managed .env: false in plain-HTTP (IP) mode — a Secure cookie
      # over http:// is silently dropped by the browser (= instant logout).
      ADMIN_COOKIE_SECURE: ${ADMIN_COOKIE_SECURE:-true}
      ADMIN_COOKIE_SIGNING_KEY: ${ADMIN_COOKIE_SIGNING_KEY}
    depends_on:
      - app

  app:
    image: ${DOCKERHUB_USER}/autoflow-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      DB_PORT: "5432"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  worker:
    image: ${DOCKERHUB_USER}/autoflow-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      DB_PORT: "5432"
    command: ["node", "dist/src/worker.js"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_ADMIN_USER}
      POSTGRES_PASSWORD: ${DB_ADMIN_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      DB_APP_USER: ${DB_APP_USER}
      DB_APP_PASSWORD: ${DB_APP_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_ADMIN_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    # Pinned: `latest` would silently roll on every deploy's compose pull.
    # curl for the healthcheck is verified present in this release.
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    # One-shot, but retry on failure: a transient minio hiccup must not leave
    # the bucket missing (all commands inside are idempotent).
    restart: on-failure
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY} ${S3_SECRET_KEY};
      mc mb --ignore-existing local/${S3_BUCKET};
      mc anonymous set download local/${S3_BUCKET};
      exit 0;
      "

volumes:
  caddy_data:
  caddy_config:
  pg_data:
  redis_data:
  minio_data:
